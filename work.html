<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fragment — Wireframe</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0608; overflow: hidden; font-family: monospace; }
    canvas { display: block; }
    #loading {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(255,255,255,0.45); font-size: 11px;
      letter-spacing: 0.25em; text-align: center; line-height: 2;
    }
    #loading span {
      display: block; font-size: 10px;
      color: rgba(255,255,255,0.2); margin-top: 0.5rem;
    }
    #info {
      position: absolute; bottom: 1.5rem; left: 1.5rem;
      color: rgba(255,255,255,0.2); font-size: 10px;
      letter-spacing: 0.15em; line-height: 2; pointer-events: none;
    }
    #controls {
      position: absolute; top: 1.5rem; right: 1.5rem;
      display: flex; flex-direction: column; gap: 8px; align-items: flex-end;
    }
    .toggle {
      background: rgba(255,255,255,0.04);
      border: 0.5px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.4); font-family: monospace;
      font-size: 10px; letter-spacing: 0.12em;
      padding: 6px 14px; cursor: pointer; transition: all 0.15s;
    }
    .toggle:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.8); }
    .toggle.active { border-color: rgba(89,44,56,0.8); color: rgba(200,120,130,0.9); }
    #stats {
      position: absolute; top: 1.5rem; left: 1.5rem;
      color: rgba(255,255,255,0.2); font-size: 10px;
      letter-spacing: 0.12em; line-height: 1.8; pointer-events: none;
    }
  </style>
</head>
<body>

<div id="loading">LOADING MESH<span id="load-sub">fetching mesh.json...</span></div>
<div id="info">LEFT DRAG — orbit &nbsp;·&nbsp; SCROLL — zoom &nbsp;·&nbsp; RIGHT DRAG — pan</div>
<div id="controls">
  <button class="toggle active" id="btn-wire">WIREFRAME</button>
  <button class="toggle"        id="btn-surface">SURFACE</button>
  <button class="toggle active" id="btn-points">POINTS</button>
  <button class="toggle active" id="btn-colors">VERTEX COLORS</button>
</div>
<div id="stats"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

// ── Renderer ─────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0608);
scene.fog = new THREE.FogExp2(0x0a0608, 0.006);

// Lights only affect the surface mesh when visible
scene.add(new THREE.AmbientLight(0xffffff, 0.3));
const d1 = new THREE.DirectionalLight(0x592C38, 0.8);
d1.position.set(1, 2, 1); scene.add(d1);
const d2 = new THREE.DirectionalLight(0x3a1a20, 0.4);
d2.position.set(-2, -1, -1); scene.add(d2);

// ── Camera ────────────────────────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 2000);

// ── Orbit controls ────────────────────────────────────────────────────────────
let isDragging = false, isRight = false;
let prevMouse = { x: 0, y: 0 };
let sph = { theta: 0, phi: 1.55, radius: 100 };
let target = new THREE.Vector3();

function updateCamera() {
  const sp = Math.sin(sph.phi);
  camera.position.set(
    target.x + sph.radius * sp * Math.sin(sph.theta),
    target.y + sph.radius * Math.cos(sph.phi),
    target.z + sph.radius * sp * Math.cos(sph.theta)
  );
  camera.lookAt(target);
}

renderer.domElement.addEventListener('mousedown', e => {
  isDragging = true; isRight = e.button === 2;
  prevMouse = { x: e.clientX, y: e.clientY };
});
renderer.domElement.addEventListener('contextmenu', e => e.preventDefault());
window.addEventListener('mouseup', () => isDragging = false);
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - prevMouse.x, dy = e.clientY - prevMouse.y;
  prevMouse = { x: e.clientX, y: e.clientY };
  if (isRight) {
    const s = sph.radius * 0.0012;
    const right = new THREE.Vector3(), up = new THREE.Vector3();
    camera.matrix.extractBasis(right, up, new THREE.Vector3());
    target.addScaledVector(right, -dx * s);
    target.addScaledVector(up,    dy * s);
  } else {
    sph.theta -= dx * 0.005;
    sph.phi = Math.max(0.05, Math.min(Math.PI - 0.05, sph.phi - dy * 0.005));
  }
  updateCamera();
});
renderer.domElement.addEventListener('wheel', e => {
  sph.radius = Math.max(2, Math.min(800, sph.radius * (1 + e.deltaY * 0.001)));
  updateCamera();
}, { passive: true });

// Touch
let lastTouch = null;
renderer.domElement.addEventListener('touchstart', e => {
  lastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}, { passive: true });
renderer.domElement.addEventListener('touchmove', e => {
  if (!lastTouch) return;
  const dx = e.touches[0].clientX - lastTouch.x;
  const dy = e.touches[0].clientY - lastTouch.y;
  lastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  sph.theta -= dx * 0.005;
  sph.phi = Math.max(0.05, Math.min(Math.PI - 0.05, sph.phi - dy * 0.005));
  updateCamera();
}, { passive: true });

// ── Scene objects ─────────────────────────────────────────────────────────────
let wireMesh = null, surfaceMesh = null, pointCloud = null;
const state = { wire: true, surface: false, points: true, colors: true };

function applyState() {
  if (wireMesh)    wireMesh.visible    = state.wire;
  if (pointCloud)  pointCloud.visible  = state.points;
  if (surfaceMesh) surfaceMesh.visible = state.surface;

  // vertex colors toggle: boost/dim wireframe and points
  if (wireMesh)   wireMesh.material.opacity   = state.colors ? 0.75 : 0.35;
  if (pointCloud) pointCloud.material.opacity = state.colors ? 0.90 : 0.40;
  if (wireMesh)   wireMesh.material.needsUpdate   = true;
  if (pointCloud) pointCloud.material.needsUpdate = true;

  // surface: switch between vertex colors and flat dark shading
  if (surfaceMesh) {
    surfaceMesh.material.vertexColors = state.colors;
    surfaceMesh.material.color.set(state.colors ? 0xffffff : 0x0d1a2a);
    surfaceMesh.material.needsUpdate = true;
  }
}

['wire','surface','points','colors'].forEach((key, i) => {
  const ids = ['btn-wire','btn-surface','btn-points','btn-colors'];
  document.getElementById(ids[i]).addEventListener('click', function() {
    state[key] = !state[key];
    this.classList.toggle('active', state[key]);
    applyState();
  });
});

// ── Load ──────────────────────────────────────────────────────────────────────
fetch('mesh.json')
  .then(r => r.json())
  .then(data => {
    document.getElementById('load-sub').textContent = 'building geometry...';

    const ptCount   = data.points.length;
    const faceCount = data.faces.length;

    // Flat arrays
    const positions = new Float32Array(ptCount * 3);
    const colorArr  = new Float32Array(ptCount * 3);

    for (let i = 0; i < ptCount; i++) {
      positions[i*3]   = data.points[i][0];
      positions[i*3+1] = data.points[i][1];
      positions[i*3+2] = data.points[i][2];
      colorArr[i*3]    = data.colors[i][0];
      colorArr[i*3+1]  = data.colors[i][1];
      colorArr[i*3+2]  = data.colors[i][2];
    }

    const indices = new Uint32Array(faceCount * 3);
    for (let i = 0; i < faceCount; i++) {
      indices[i*3]   = data.faces[i][0];
      indices[i*3+1] = data.faces[i][1];
      indices[i*3+2] = data.faces[i][2];
    }

    // Shared mesh geometry
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setAttribute('color',    new THREE.BufferAttribute(colorArr,  3));
    geo.setIndex(new THREE.BufferAttribute(indices, 1));
    geo.computeVertexNormals();

    // ── 1. Invisible surface (used only when SURFACE toggle is ON) ────────────
    surfaceMesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({
      vertexColors: true,
      transparent: true,
      opacity: 0.72,
      side: THREE.DoubleSide,
      depthWrite: false,
    }));
    surfaceMesh.visible = false;
    scene.add(surfaceMesh);

    // ── 2. Wireframe with vertex colors ───────────────────────────────────────
    document.getElementById('load-sub').textContent = 'building wireframe...';

    const edgeGeo = new THREE.EdgesGeometry(geo, 10);
    const edgePos = edgeGeo.attributes.position;

    // Build a fast position→colorIndex lookup map
    // key = "x,y,z" rounded to 3dp to handle float imprecision
    const colorMap = new Map();
    for (let j = 0; j < ptCount; j++) {
      const key =
        positions[j*3  ].toFixed(3) + ',' +
        positions[j*3+1].toFixed(3) + ',' +
        positions[j*3+2].toFixed(3);
      colorMap.set(key, j);
    }

    const edgeColors = new Float32Array(edgePos.count * 3);
    for (let i = 0; i < edgePos.count; i++) {
      const key =
        edgePos.getX(i).toFixed(3) + ',' +
        edgePos.getY(i).toFixed(3) + ',' +
        edgePos.getZ(i).toFixed(3);
      const j = colorMap.has(key) ? colorMap.get(key) : 0;
      edgeColors[i*3]   = colorArr[j*3];
      edgeColors[i*3+1] = colorArr[j*3+1];
      edgeColors[i*3+2] = colorArr[j*3+2];
    }
    edgeGeo.setAttribute('color', new THREE.BufferAttribute(edgeColors, 3));

    wireMesh = new THREE.LineSegments(edgeGeo, new THREE.LineBasicMaterial({
      vertexColors: true,
      transparent: true,
      opacity: 0.75,
    }));
    scene.add(wireMesh);

    // ── 3. Point cloud ────────────────────────────────────────────────────────
    const ptGeo = new THREE.BufferGeometry();
    ptGeo.setAttribute('position', new THREE.BufferAttribute(positions.slice(), 3));
    ptGeo.setAttribute('color',    new THREE.BufferAttribute(colorArr.slice(),  3));
    pointCloud = new THREE.Points(ptGeo, new THREE.PointsMaterial({
      size: 0.12,
      vertexColors: true,
      transparent: true,
      opacity: 0.9,
      sizeAttenuation: true,
    }));
    scene.add(pointCloud);

    // ── Camera setup ──────────────────────────────────────────────────────────
    target.set(data.center[0], data.center[1], data.center[2]);
    sph.radius = data.spread * 0.8;
    updateCamera();

    document.getElementById('stats').textContent =
      ptCount.toLocaleString() + ' pts · ' + faceCount.toLocaleString() + ' faces';
    document.getElementById('loading').style.display = 'none';
    applyState();
  })
  .catch(err => {
    document.getElementById('load-sub').textContent = 'ERROR: ' + err.message;
  });

// ── Resize ────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── Render loop ───────────────────────────────────────────────────────────────
(function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
})();

</script>
</body>
</html>
