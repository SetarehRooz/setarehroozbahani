<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fragment — Point Cloud</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #060606; overflow: hidden; font-family: monospace; }
    canvas { display: block; }
    #info {
      position: absolute; bottom: 1.5rem; left: 1.5rem;
      color: rgba(255,255,255,0.35); font-size: 10px; letter-spacing: 0.15em;
      line-height: 1.8; pointer-events: none;
    }
    #loading {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      color: rgba(255,255,255,0.5); font-size: 11px; letter-spacing: 0.2em;
    }
  </style>
</head>
<body>
  <div id="loading">LOADING POINT CLOUD...</div>
  <div id="info">
    DRAG — orbit &nbsp;|&nbsp; SCROLL — zoom &nbsp;|&nbsp; RIGHT DRAG — pan
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>

    // ── Renderer ──────────────────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x060606);
    scene.fog = new THREE.FogExp2(0x060606, 0.008);

    // ── Camera ────────────────────────────────────────────────────────────
    // Center from exported data: (-7.061, 15.442, -3.364), spread: 62.354
    const CENTER = new THREE.Vector3(-7.061, 15.442, -3.364);
    const SPREAD = 62.354;

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(CENTER.x, CENTER.y, CENTER.z + SPREAD * 1.4);
    camera.lookAt(CENTER);

    // ── Orbit controls (manual — no import needed) ────────────────────────
    let isDragging = false, isRightDrag = false;
    let prevMouse = { x: 0, y: 0 };
    let spherical = {
      theta: 0, phi: Math.PI / 2,
      radius: SPREAD * 1.4
    };
    let panOffset = new THREE.Vector3();
    let target = CENTER.clone();

    function updateCamera() {
      const sinPhi = Math.sin(spherical.phi);
      camera.position.set(
        target.x + spherical.radius * sinPhi * Math.sin(spherical.theta),
        target.y + spherical.radius * Math.cos(spherical.phi),
        target.z + spherical.radius * sinPhi * Math.cos(spherical.theta)
      );
      camera.lookAt(target);
    }

    renderer.domElement.addEventListener('mousedown', e => {
      isDragging = true;
      isRightDrag = e.button === 2;
      prevMouse = { x: e.clientX, y: e.clientY };
    });
    renderer.domElement.addEventListener('contextmenu', e => e.preventDefault());
    window.addEventListener('mouseup', () => { isDragging = false; });
    window.addEventListener('mousemove', e => {
      if (!isDragging) return;
      const dx = e.clientX - prevMouse.x;
      const dy = e.clientY - prevMouse.y;
      prevMouse = { x: e.clientX, y: e.clientY };
      if (isRightDrag) {
        const panSpeed = spherical.radius * 0.001;
        const right = new THREE.Vector3();
        const up = new THREE.Vector3();
        camera.matrix.extractBasis(right, up, new THREE.Vector3());
        target.addScaledVector(right, -dx * panSpeed);
        target.addScaledVector(up,    dy * panSpeed);
      } else {
        spherical.theta -= dx * 0.005;
        spherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, spherical.phi - dy * 0.005));
      }
      updateCamera();
    });
    renderer.domElement.addEventListener('wheel', e => {
      spherical.radius *= 1 + e.deltaY * 0.001;
      spherical.radius = Math.max(1, Math.min(SPREAD * 3, spherical.radius));
      updateCamera();
    });

    // ── Load point cloud ──────────────────────────────────────────────────
    fetch('points.json')
      .then(res => res.json())
      .then(data => {
        document.getElementById('loading').style.display = 'none';

        const count = data.points.length;
        const positions = new Float32Array(count * 3);
        const colorArr  = new Float32Array(count * 3);

        for (let i = 0; i < count; i++) {
          positions[i*3]   = data.points[i][0];
          positions[i*3+1] = data.points[i][1];
          positions[i*3+2] = data.points[i][2];
          colorArr[i*3]    = data.colors[i][0];
          colorArr[i*3+1]  = data.colors[i][1];
          colorArr[i*3+2]  = data.colors[i][2];
        }

        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geo.setAttribute('color',    new THREE.BufferAttribute(colorArr, 3));

        const mat = new THREE.PointsMaterial({
          size: 0.12,
          vertexColors: true,
          transparent: true,
          opacity: 0.85,
          sizeAttenuation: true
        });

        scene.add(new THREE.Points(geo, mat));
        updateCamera();
      })
      .catch(err => {
        document.getElementById('loading').textContent =
          'ERROR: ' + err.message + ' — make sure points.json is in the same folder';
      });

    // ── Resize ────────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ── Render loop ───────────────────────────────────────────────────────
    (function animate() {
      requestAnimationFrame(animate);
      renderer.render(scene, camera);
    })();

  </script>
</body>
</html>
