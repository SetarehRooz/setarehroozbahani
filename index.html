<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Setareh Roozbahani - Wireframe Home</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loading">LOADING MESH<span id="load-sub">fetching mesh.json...</span></div>
<div id="info">LEFT DRAG — orbit &nbsp;·&nbsp; SCROLL — zoom &nbsp;·&nbsp; RIGHT DRAG — pan</div>

<!-- desktop controls -->
<div id="controls">
  <button class="toggle active" id="btn-wire">WIREFRAME</button>
  <button class="toggle"        id="btn-surface">SURFACE</button>
  <button class="toggle active" id="btn-points">POINTS</button>
  <button class="toggle active" id="btn-colors">VERTEX COLORS</button>
  <div id="menu-wrapper">
    <button class="toggle" id="btn-menu">MENU</button>
    <div id="menu-dropdown">
      <a href="projects.html">PROJECTS</a>
      <a href="research.html">RESEARCH</a>
      <a href="about.html">ABOUT</a>
    </div>
  </div>
</div>

<!-- mobile menu button top-right + its dropdown -->
<button id="btn-menu-mobile">MENU</button>
<div id="menu-dropdown-mobile">
  <a href="projects.html">PROJECTS</a>
  <a href="research.html">RESEARCH</a>
  <a href="about.html">ABOUT</a>
</div>

<div id="stats"></div>
<a id="name-top" href="index.html">Setareh Roozbahani</a>
<div id="name-bottom">
  <span id="sig-name">&copy; 2026 Setareh Roozbahani</span>
</div>
<div id="node-label"></div>
<div id="mobile-hint">DRAG · PINCH · TAP NODES</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

// ── Renderer ──────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0608);
scene.fog = new THREE.FogExp2(0x0a0608, 0.006);

scene.add(new THREE.AmbientLight(0xffffff, 0.3));
const d1 = new THREE.DirectionalLight(0x592C38, 0.8);
d1.position.set(1, 2, 1); scene.add(d1);
const d2 = new THREE.DirectionalLight(0x3a1a20, 0.4);
d2.position.set(-2, -1, -1); scene.add(d2);

// ── Camera ────────────────────────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 2000);

// ── Orbit controls ────────────────────────────────────────────────────────────
let isDragging = false, isRight = false;
let prevMouse = { x: 0, y: 0 };
let sph = { theta: 0, phi: 1.55, radius: 100 };
let target = new THREE.Vector3();

function updateCamera() {
  const sp = Math.sin(sph.phi);
  camera.position.set(
    target.x + sph.radius * sp * Math.sin(sph.theta),
    target.y + sph.radius * Math.cos(sph.phi),
    target.z + sph.radius * sp * Math.cos(sph.theta)
  );
  camera.lookAt(target);
}

// ── Mouse ─────────────────────────────────────────────────────────────────────
let mouseDownPos = { x: 0, y: 0 };
renderer.domElement.addEventListener('mousedown', e => {
  isDragging = true;
  isRight = e.button === 2;
  prevMouse = { x: e.clientX, y: e.clientY };
  mouseDownPos = { x: e.clientX, y: e.clientY };
});
renderer.domElement.addEventListener('contextmenu', e => e.preventDefault());
window.addEventListener('mouseup', () => { isDragging = false; });
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - prevMouse.x;
  const dy = e.clientY - prevMouse.y;
  prevMouse = { x: e.clientX, y: e.clientY };
  if (isRight) {
    const s = sph.radius * 0.0012;
    const right = new THREE.Vector3(), up = new THREE.Vector3();
    camera.matrix.extractBasis(right, up, new THREE.Vector3());
    target.addScaledVector(right, -dx * s);
    target.addScaledVector(up,    dy * s);
  } else {
    sph.theta -= dx * 0.005;
    sph.phi = Math.max(0.05, Math.min(Math.PI - 0.05, sph.phi - dy * 0.005));
  }
  updateCamera();
});
renderer.domElement.addEventListener('wheel', e => {
  sph.radius = Math.max(2, Math.min(800, sph.radius * (1 + e.deltaY * 0.001)));
  updateCamera();
}, { passive: true });

// ── Touch ─────────────────────────────────────────────────────────────────────
let t1 = null, t2 = null, prevDist = null;

renderer.domElement.addEventListener('touchstart', e => {
  e.preventDefault();
  t1 = null; t2 = null; prevDist = null;
  if (e.touches.length >= 1) t1 = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  if (e.touches.length >= 2) t2 = { x: e.touches[1].clientX, y: e.touches[1].clientY };
}, { passive: false });

renderer.domElement.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && t1) {
    const dx = e.touches[0].clientX - t1.x;
    const dy = e.touches[0].clientY - t1.y;
    sph.theta -= dx * 0.005;
    sph.phi = Math.max(0.05, Math.min(Math.PI - 0.05, sph.phi - dy * 0.005));
    t1 = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    updateCamera();
  } else if (e.touches.length === 2) {
    const ax = e.touches[0].clientX, ay = e.touches[0].clientY;
    const bx = e.touches[1].clientX, by = e.touches[1].clientY;
    const dist = Math.sqrt((ax - bx) ** 2 + (ay - by) ** 2);
    if (prevDist !== null) {
      sph.radius = Math.max(2, Math.min(800, sph.radius * (prevDist / dist)));
      updateCamera();
    }
    prevDist = dist;
    t1 = { x: ax, y: ay };
    t2 = { x: bx, y: by };
  }
}, { passive: false });

renderer.domElement.addEventListener('touchend', e => {
  e.preventDefault();
  t1 = null; t2 = null; prevDist = null;
  if (e.touches.length >= 1) t1 = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  if (e.touches.length >= 2) t2 = { x: e.touches[1].clientX, y: e.touches[1].clientY };
}, { passive: false });

// ── Nav nodes ─────────────────────────────────────────────────────────────────
const NAV_NODES = [
  { label: 'PROJECTS', href: 'projects.html', pos: new THREE.Vector3(-3.10,  26.84, -7.43) },
  { label: 'RESEARCH', href: 'research.html', pos: new THREE.Vector3(-1.13,  29.49, -7.71) },
  { label: 'ABOUT',    href: 'about.html',    pos: new THREE.Vector3(-25.10, 32.60, -10.74) },
];

const nodeObjects = [];
const raycaster   = new THREE.Raycaster();
const mouse2D     = new THREE.Vector2();
const nodeLabel   = document.getElementById('node-label');
let hoveredNode   = null;

function buildNavNodes() {
  NAV_NODES.forEach((n, i) => {
    const group = new THREE.Group();
    group.position.copy(n.pos);

    // Visible dot
    const dot = new THREE.Mesh(
      new THREE.SphereGeometry(0.45, 16, 16),
      new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.85 })
    );
    group.add(dot);

    // Invisible larger hit sphere — makes clicking much easier
    const hitSphere = new THREE.Mesh(
      new THREE.SphereGeometry(2.5, 8, 8),
      new THREE.MeshBasicMaterial({ transparent: true, opacity: 0, depthWrite: false })
    );
    group.add(hitSphere);

    // Pulsing ring
    const ring = new THREE.Mesh(
      new THREE.RingGeometry(0.65, 0.88, 32),
      new THREE.MeshBasicMaterial({ color: 0xc87882, transparent: true, opacity: 0.55, side: THREE.DoubleSide })
    );
    group.add(ring);

    // Mobile persistent label — always visible, tracks node in 3D
    const mobileLabel = document.createElement('div');
    mobileLabel.className = 'mobile-node-label';
    mobileLabel.textContent = n.label;
    document.body.appendChild(mobileLabel);

    scene.add(group);
    nodeObjects.push({ group, dot, hitSphere, ring, data: n, mobileLabel });
  });
}

// Convert 3D world pos → 2D screen px
function worldToScreen(pos3d) {
  const v = pos3d.clone().project(camera);
  return {
    x: ( v.x * 0.5 + 0.5) * window.innerWidth,
    y: (-v.y * 0.5 + 0.5) * window.innerHeight,
  };
}

function updateNodeLabel() {
  if (!hoveredNode) return;
  const screen = worldToScreen(hoveredNode.group.position);
  nodeLabel.style.left = screen.x + 'px';
  nodeLabel.style.top  = (screen.y - 18) + 'px';
}

// ── Hover (mouse) ─────────────────────────────────────────────────────────────
renderer.domElement.addEventListener('mousemove', e => {
  if (isDragging) { nodeLabel.style.opacity = '0'; hoveredNode = null; return; }
  mouse2D.x =  (e.clientX / window.innerWidth)  * 2 - 1;
  mouse2D.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse2D, camera);
  const hits = raycaster.intersectObjects(nodeObjects.map(n => n.hitSphere));
  if (hits.length > 0) {
    const idx = nodeObjects.findIndex(n => n.hitSphere === hits[0].object);
    hoveredNode = nodeObjects[idx];
    document.body.style.cursor = 'pointer';
    nodeLabel.textContent = hoveredNode.data.label;
    nodeLabel.style.opacity = '1';
    updateNodeLabel();
  } else {
    hoveredNode = null;
    document.body.style.cursor = 'default';
    nodeLabel.style.opacity = '0';
  }
});

// ── Click (desktop) — navigate directly, no alert ─────────────────────────────
renderer.domElement.addEventListener('click', e => {
  // ignore if mouse moved more than 4px — that was a drag not a click
  const moved = Math.abs(e.clientX - mouseDownPos.x) + Math.abs(e.clientY - mouseDownPos.y);
  if (moved > 4) return;
  mouse2D.x =  (e.clientX / window.innerWidth)  * 2 - 1;
  mouse2D.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse2D, camera);
  const hits = raycaster.intersectObjects(nodeObjects.map(n => n.hitSphere));
  if (hits.length > 0) {
    const idx = nodeObjects.findIndex(n => n.hitSphere === hits[0].object);
    window.location.href = nodeObjects[idx].data.href;
  }
});

// ── Tap (mobile) — navigate directly, no alert ────────────────────────────────
renderer.domElement.addEventListener('touchend', e => {
  if (e.changedTouches.length !== 1) return;
  const touch = e.changedTouches[0];
  mouse2D.x =  (touch.clientX / window.innerWidth)  * 2 - 1;
  mouse2D.y = -(touch.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse2D, camera);
  const hits = raycaster.intersectObjects(nodeObjects.map(n => n.hitSphere));
  if (hits.length > 0) {
    const idx = nodeObjects.findIndex(n => n.hitSphere === hits[0].object);
    window.location.href = nodeObjects[idx].data.href;
  }
}, { passive: true });

// ── Scene toggles ─────────────────────────────────────────────────────────────
let wireMesh = null, surfaceMesh = null, pointCloud = null;
const state = { wire: true, surface: false, points: true, colors: true };

function applyState() {
  if (wireMesh)    wireMesh.visible    = state.wire;
  if (pointCloud)  pointCloud.visible  = state.points;
  if (surfaceMesh) surfaceMesh.visible = state.surface;
  if (wireMesh) {
    wireMesh.material.opacity = state.colors ? 0.75 : 0.35;
    wireMesh.material.needsUpdate = true;
  }
  if (pointCloud) {
    pointCloud.material.opacity = state.colors ? 0.90 : 0.40;
    pointCloud.material.needsUpdate = true;
  }
  if (surfaceMesh) {
    surfaceMesh.material.vertexColors = state.colors;
    surfaceMesh.material.color.set(state.colors ? 0xffffff : 0x0d1a2a);
    surfaceMesh.material.needsUpdate = true;
  }
}

['wire','surface','points','colors'].forEach((key, i) => {
  const ids = ['btn-wire','btn-surface','btn-points','btn-colors'];
  document.getElementById(ids[i]).addEventListener('click', function() {
    state[key] = !state[key];
    this.classList.toggle('active', state[key]);
    applyState();
  });
});

// ── Load mesh ─────────────────────────────────────────────────────────────────
fetch('mesh.json')
  .then(r => r.json())
  .then(data => {
    document.getElementById('load-sub').textContent = 'building geometry...';

    const ptCount   = data.points.length;
    const faceCount = data.faces.length;

    const positions = new Float32Array(ptCount * 3);
    const colorArr  = new Float32Array(ptCount * 3);

    for (let i = 0; i < ptCount; i++) {
      positions[i*3]   = data.points[i][0];
      positions[i*3+1] = data.points[i][1];
      positions[i*3+2] = data.points[i][2];
      colorArr[i*3]    = data.colors[i][0];
      colorArr[i*3+1]  = data.colors[i][1];
      colorArr[i*3+2]  = data.colors[i][2];
    }

    const indices = new Uint32Array(faceCount * 3);
    for (let i = 0; i < faceCount; i++) {
      indices[i*3]   = data.faces[i][0];
      indices[i*3+1] = data.faces[i][1];
      indices[i*3+2] = data.faces[i][2];
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setAttribute('color',    new THREE.BufferAttribute(colorArr,  3));
    geo.setIndex(new THREE.BufferAttribute(indices, 1));
    geo.computeVertexNormals();

    surfaceMesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({
      vertexColors: true, transparent: true, opacity: 0.72,
      side: THREE.DoubleSide, depthWrite: false,
    }));
    surfaceMesh.visible = false;
    scene.add(surfaceMesh);

    document.getElementById('load-sub').textContent = 'building wireframe...';
    const edgeGeo = new THREE.EdgesGeometry(geo, 10);
    const edgePos = edgeGeo.attributes.position;
    const colorMap = new Map();
    for (let j = 0; j < ptCount; j++) {
      const key = positions[j*3].toFixed(3)+','+positions[j*3+1].toFixed(3)+','+positions[j*3+2].toFixed(3);
      colorMap.set(key, j);
    }
    const edgeColors = new Float32Array(edgePos.count * 3);
    for (let i = 0; i < edgePos.count; i++) {
      const key = edgePos.getX(i).toFixed(3)+','+edgePos.getY(i).toFixed(3)+','+edgePos.getZ(i).toFixed(3);
      const j = colorMap.has(key) ? colorMap.get(key) : 0;
      edgeColors[i*3]   = colorArr[j*3];
      edgeColors[i*3+1] = colorArr[j*3+1];
      edgeColors[i*3+2] = colorArr[j*3+2];
    }
    edgeGeo.setAttribute('color', new THREE.BufferAttribute(edgeColors, 3));
    wireMesh = new THREE.LineSegments(edgeGeo, new THREE.LineBasicMaterial({
      vertexColors: true, transparent: true, opacity: 0.75,
    }));
    scene.add(wireMesh);

    const ptGeo = new THREE.BufferGeometry();
    ptGeo.setAttribute('position', new THREE.BufferAttribute(positions.slice(), 3));
    ptGeo.setAttribute('color',    new THREE.BufferAttribute(colorArr.slice(),  3));
    pointCloud = new THREE.Points(ptGeo, new THREE.PointsMaterial({
      size: 0.12, vertexColors: true, transparent: true, opacity: 0.9, sizeAttenuation: true,
    }));
    scene.add(pointCloud);

    target.set(data.center[0], data.center[1], data.center[2]);
    sph.radius = data.spread * 0.8;
    updateCamera();

    buildNavNodes();

    document.getElementById('stats').textContent =
      ptCount.toLocaleString() + ' pts · ' + faceCount.toLocaleString() + ' faces';
    document.getElementById('loading').style.display = 'none';
    applyState();
  })
  .catch(err => {
    document.getElementById('load-sub').textContent = 'ERROR: ' + err.message;
  });

// ── Resize ────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── Menu toggle ───────────────────────────────────────────────────────────────
const menuDropdown       = document.getElementById('menu-dropdown');
const menuDropdownMobile = document.getElementById('menu-dropdown-mobile');
const btnMenu            = document.getElementById('btn-menu');
const btnMenuMobile      = document.getElementById('btn-menu-mobile');

function closeMenus() {
  menuDropdown.classList.remove('open');
  menuDropdownMobile.classList.remove('open');
  btnMenu.classList.remove('active');
  btnMenuMobile.classList.remove('active');
}

btnMenu.addEventListener('click', e => {
  e.stopPropagation();
  const open = menuDropdown.classList.toggle('open');
  btnMenu.classList.toggle('active', open);
});

btnMenuMobile.addEventListener('click', e => {
  e.stopPropagation();
  const open = menuDropdownMobile.classList.toggle('open');
  btnMenuMobile.classList.toggle('active', open);
});

// close when clicking outside
document.addEventListener('click', e => {
  if (!e.target.closest('#menu-wrapper') && !e.target.closest('#btn-menu-mobile') && !e.target.closest('#menu-dropdown-mobile')) {
    closeMenus();
  }
});

// fade out mobile hint after 4s
const mobileHint = document.getElementById('mobile-hint');
if (mobileHint) setTimeout(() => { mobileHint.style.opacity = '0'; }, 4000);

// ── Render loop ───────────────────────────────────────────────────────────────
const clock = new THREE.Clock();

(function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  nodeObjects.forEach((n, i) => {
    n.ring.lookAt(camera.position);
    n.ring.scale.setScalar(1 + Math.sin(t * 2 + i * 1.2) * 0.12);
    const hov = hoveredNode === n;
    n.dot.material.opacity  = hov ? 1.0  : 0.75;
    n.dot.scale.setScalar(hov ? 1.4 : 1.0);
    n.ring.material.opacity = hov ? 0.95 : 0.5;
  });

  if (hoveredNode) updateNodeLabel();

  // Update mobile node label positions every frame
  nodeObjects.forEach(n => {
    if (!n.mobileLabel) return;
    const screen = worldToScreen(n.group.position);
    n.mobileLabel.style.left = screen.x + 'px';
    n.mobileLabel.style.top  = (screen.y - 18) + 'px';
  });

  renderer.render(scene, camera);
})();

</script>
</body>
</html>
